{% extends "base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<section class="error-page">
    <div>
        <div class="error-code">404</div>
        <h2>页面未找到</h2>
        <p>抱歉，您访问的页面不存在或已被移除</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> 返回首页
        </a>
    </div>
</section>
{% endblock %}
